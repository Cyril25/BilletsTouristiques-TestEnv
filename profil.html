<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mon profil — adresse postale et informations personnelles.">
    <title>Mon profil - BilletsTouristiques</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="menu-placeholder"></div>
    <div id="app-content" style="display:none">

        <div class="profil-page">
            <div class="profil-header">
                <h1><i class="fa-solid fa-user"></i> Mon profil</h1>
            </div>

            <!-- Message de redirection si from=inscription -->
            <div id="profil-redirect-msg" class="profil-redirect-msg" style="display:none">
                <i class="fa-solid fa-circle-info"></i>
                <span>Complétez votre profil avant de vous inscrire à une collecte.</span>
            </div>

            <div class="profil-email-display">
                <i class="fa-solid fa-envelope"></i>
                <span id="profil-email"></span>
            </div>

            <form id="profil-form" class="profil-form" novalidate>
                <div class="profil-form-group">
                    <label for="profil-nom">Nom *</label>
                    <input type="text" id="profil-nom" required autocomplete="family-name" placeholder="Votre nom">
                </div>

                <div class="profil-form-group">
                    <label for="profil-prenom">Prénom *</label>
                    <input type="text" id="profil-prenom" required autocomplete="given-name" placeholder="Votre prénom">
                </div>

                <div class="profil-form-group">
                    <label for="profil-rue">Rue *</label>
                    <input type="text" id="profil-rue" required autocomplete="street-address" placeholder="Numéro et nom de rue">
                </div>

                <div class="profil-form-group">
                    <label for="profil-code-postal">Code postal *</label>
                    <input type="text" id="profil-code-postal" required autocomplete="postal-code" placeholder="Code postal">
                </div>

                <div class="profil-form-group">
                    <label for="profil-ville">Ville *</label>
                    <input type="text" id="profil-ville" required autocomplete="address-level2" placeholder="Ville">
                </div>

                <div class="profil-form-group">
                    <label for="profil-pays">Pays *</label>
                    <input type="text" id="profil-pays" required autocomplete="country-name" placeholder="Pays">
                </div>

                <button type="submit" id="profil-save-btn" class="profil-save-btn">
                    <i class="fa-solid fa-floppy-disk"></i> Sauvegarder
                </button>
            </form>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js" integrity="sha384-v3Z/Xdw1sCeo6M/geW7sn1Lt9obIm7MhAk8laVV+rvYFmzuWDELOiygx7dVte2dX" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js" integrity="sha384-p62xBRve8PdqGDGASZtZMuHgPsyPcT5VsFwgmz2p4zaFdEtt5ZzNqxK+CLzQS7xP" crossorigin="anonymous"></script>
    <script src="global.js"></script>
    <script src="profil.js"></script>
</body>
</html>
