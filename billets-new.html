<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Annuaire des billets touristiques — version admin basée Supabase.">
    <title>Les Billets (new) - Collection Billet Touristique</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.css" integrity="sha512-qveKnGrvOChbSzAdtSs8p69eoLegyh+1hwOMbmpCViIwj7rn4oJjdmMvWOuyQlTOZgTlZA0N2PXA7iA8/2TUYA==" crossorigin="anonymous">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.js" integrity="sha512-UOJe4paV6hYWBnS0c9GnIRH8PLm2nFK22uhfAvsTIqd3uwnWsVri1OPn5fJYdLtGY3wB11LGHJ4yPU1WFJeBYQ==" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="view-collecte" data-require-admin="true"> <div id="app-content" style="display:none">
        <div id="menu-placeholder"></div>

        <header>
            <div>
                <span style="font-weight:bold; font-size:1.2em;">Annuaire Billets (Supabase)</span>
                <span id="counter" style="background:#eee; padding:5px 10px; border-radius:15px; font-size:0.8em; margin-left:10px;">Chargement...</span>
            </div>
        </header>

        <div style="display:flex; justify-content:flex-end; margin-bottom:10px; gap:10px;">
            <button onclick="changeView('collecte')" class="btn-mode" title="Mode Collecte"><i class="fa-solid fa-address-card"></i> Collecte</button>
            <button onclick="changeView('liste')" class="btn-mode" title="Mode Liste"><i class="fa-solid fa-list"></i> Liste</button>
            <button onclick="changeView('galerie')" class="btn-mode" title="Mode Galerie"><i class="fa-solid fa-images"></i> Galerie</button>
        </div>

        <div class="filters-row">
            <div class="filter-group" style="flex-grow: 2;">
                <label for="search-input">Recherche</label>
                <input type="text" id="search-input" placeholder="Ville, Nom, Réf..." onkeyup="applyFilters()">
            </div>

            <div class="filter-group" style="min-width: 300px; flex-grow: 1.5;">
                <label>Période (Date)</label>

                <div id="date-slider" style="margin: 10px 10px 20px 10px;" role="group" aria-label="Filtre par période"></div>

                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="date" id="date-start" aria-label="Date de début" onchange="manualDateChange()">
                    <span style="color:#999;" aria-hidden="true">à</span>
                    <input type="date" id="date-end" aria-label="Date de fin" onchange="manualDateChange()">
                </div>
            </div>
        </div>

        <div class="filters-row">
            <div class="filter-group"><label for="sel-coll">Collecteur</label><select id="sel-coll" onchange="applyFilters()"><option value="">Tout</option></select></div>
            <div class="filter-group"><label for="sel-pays">Pays</label><select id="sel-pays" onchange="applyFilters()"><option value="">Tout</option></select></div>
            <div class="filter-group"><label for="sel-year">Millésime</label><select id="sel-year" onchange="applyFilters()"><option value="">Tout</option></select></div>
            <div class="filter-group"><label for="sel-theme">Thème</label><select id="sel-theme" onchange="applyFilters()"><option value="">Tout</option></select></div>
        </div>

        <!-- Filtres par catégorie (chips) -->
        <div id="billets-status-counters" class="admin-status-counters"></div>

        <div id="cards-grid">
            <p style="text-align:center; padding:40px; color:#666; font-style:italic;">Chargement de la collection...</p>
        </div>

        <div id="list-table-container" class="hidden">
            </div>

        <div style="text-align:center; margin: 40px 0;">
            <button id="btn-load-more" onclick="showMore()">Voir la suite</button>
        </div>

    </div> <div id="image-modal" class="image-modal hidden" onclick="closeModal()">
        <span class="close-btn" role="button" aria-label="Fermer l'image" tabindex="0">&times;</span>
        <img class="modal-content" id="modal-image">
    </div>


    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js" integrity="sha384-v3Z/Xdw1sCeo6M/geW7sn1Lt9obIm7MhAk8laVV+rvYFmzuWDELOiygx7dVte2dX" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js" integrity="sha384-p62xBRve8PdqGDGASZtZMuHgPsyPcT5VsFwgmz2p4zaFdEtt5ZzNqxK+CLzQS7xP" crossorigin="anonymous"></script>

    <script src="global.js"></script>
    <script src="app-new.js"></script>

</body>
</html>
