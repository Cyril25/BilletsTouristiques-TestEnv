<html lang="fr">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Connexion à l'espace membres de l'association Billets et Jetons Touristiques.">
    <title>Connexion - Association Billet Touristique</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous">

    <link rel="stylesheet" href="style.css">

    </head>
<body class="login-page"> <div class="login-card">

        <i class="fa-solid fa-users-viewfinder logo-icon"></i>

        <h1>Espace Membres</h1>
        <p>Veuillez vous identifier avec votre compte Google pour accéder à l'annuaire et aux collectes de l'association.</p>

        <div id="webview-warning" style="display:none; background:#FFF3CD; border:1px solid #FFCC02; border-radius:8px; padding:16px; margin-bottom:20px; text-align:center;">
            <p style="margin:0 0 10px 0; color:#664D03; font-size:0.95rem; line-height:1.5;">
                <i class="fa-solid fa-triangle-exclamation"></i>
                La connexion Google ne fonctionne pas depuis Messenger ou Facebook. Ouvrez cette page dans votre navigateur :
            </p>
            <a id="webview-open-btn" href="#" style="display:inline-block; background:var(--color-primary); color:#fff; padding:10px 24px; border-radius:6px; text-decoration:none; font-weight:500;">
                <i class="fa-solid fa-arrow-up-right-from-square"></i> Ouvrir dans le navigateur
            </a>
        </div>

        <button id="btn-google-login" class="btn-google" onclick="loginWithGoogle()">
            <i class="fa-brands fa-google"></i> Se connecter avec Google
        </button>

        <div id="error-msg"></div>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js" integrity="sha384-v3Z/Xdw1sCeo6M/geW7sn1Lt9obIm7MhAk8laVV+rvYFmzuWDELOiygx7dVte2dX" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js" integrity="sha384-p62xBRve8PdqGDGASZtZMuHgPsyPcT5VsFwgmz2p4zaFdEtt5ZzNqxK+CLzQS7xP" crossorigin="anonymous"></script>

<script src="global.js"></script>

<script>
// Détection navigateur intégré (Messenger, Facebook, Instagram, etc.)
(function() {
    var ua = navigator.userAgent || '';
    var isWebView = /FBAN|FBAV|FB_IAB|Instagram|Messenger|Line\//i.test(ua);
    if (isWebView) {
        var warning = document.getElementById('webview-warning');
        var btnGoogle = document.getElementById('btn-google-login');
        if (warning) warning.style.display = 'block';
        if (btnGoogle) btnGoogle.style.display = 'none';

        // Lien pour ouvrir dans le navigateur par défaut
        var openBtn = document.getElementById('webview-open-btn');
        if (openBtn) {
            var url = window.location.href;
            // Android : intent:// ouvre dans le navigateur par défaut
            var isAndroid = /android/i.test(ua);
            if (isAndroid) {
                openBtn.href = 'intent://' + url.replace(/^https?:\/\//, '') + '#Intent;scheme=https;end';
            } else {
                // iOS et autres : lien direct (l'utilisateur peut long-press ou copier)
                openBtn.href = url;
                openBtn.setAttribute('target', '_blank');
            }
        }
    }
})();

// STORY 1.2 — Afficher le message d'erreur si paramètre ?error=unauthorized
var urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('error') === 'unauthorized') {
    var errorMsg = document.getElementById('error-msg');
    if (errorMsg) {
        errorMsg.textContent = "Accès refusé. Votre email n'est pas dans la liste des membres autorisés.";
        errorMsg.style.display = 'block';
    }
}
</script>

</body>
</html>
