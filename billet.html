<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdnjs.cloudflare.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https://drive.google.com https://drive.usercontent.google.com https://lh3.googleusercontent.com https://res.cloudinary.com https://api.qrserver.com; connect-src 'self' https://www.gstatic.com https://lhwcoybugdsggcclhtgb.supabase.co https://ijxajtxnhbczgiarkefo.supabase.co https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.googleapis.com https://accounts.google.com https://api.cloudinary.com https://billet-proxy-worker.cyril-samson41.workers.dev; frame-src 'self' https://asso-billet-site.firebaseapp.com https://apis.google.com https://accounts.google.com;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Fiche détaillée d'un billet touristique — image, informations et QR code.">
    <title>Fiche Billet - Collection Billet Touristique</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-content">
        <div id="menu-placeholder"></div>

        <div class="billet-fiche">
            <div id="billet-loading" style="text-align:center; padding:60px; color:#666; font-style:italic;">
                <i class="fa-solid fa-spinner fa-spin" style="font-size:1.5em; margin-bottom:12px; display:block;"></i>
                Chargement du billet...
            </div>

            <div id="billet-error" class="hidden" style="text-align:center; padding:60px; color:var(--color-danger, #CC4444);">
                <i class="fa-solid fa-circle-exclamation" style="font-size:2em; margin-bottom:12px; display:block;"></i>
                <strong>Billet introuvable.</strong><br>
                <span style="color:var(--color-text-light, #666);">Vérifiez le lien ou retournez à <a href="billets.html">l'annuaire</a>.</span>
            </div>

            <div id="billet-content" class="hidden">
                <div class="billet-fiche-image-wrapper">
                    <img id="billet-image" class="billet-fiche-image" alt="Image du billet">
                </div>

                <div class="billet-fiche-infos">
                    <h1 id="billet-nom"></h1>
                    <div class="billet-fiche-details">
                        <p><i class="fa-solid fa-hashtag"></i> <span id="billet-ref"></span></p>
                        <p><i class="fa-solid fa-location-dot"></i> <span id="billet-lieu"></span></p>
                        <p><i class="fa-solid fa-calendar"></i> <span id="billet-millesime"></span>-<span id="billet-version"></span></p>
                        <p><i class="fa-solid fa-tag"></i> <span id="billet-categorie" class="billet-fiche-badge"></span></p>
                        <p id="billet-theme-row"><i class="fa-solid fa-palette"></i> <span id="billet-theme"></span></p>
                        <p id="billet-commentaire-row"><i class="fa-solid fa-comment"></i> <span id="billet-commentaire"></span></p>
                    </div>
                    <div style="margin-top:24px;">
                        <a href="billets.html" class="btn-mode"><i class="fa-solid fa-arrow-left"></i> Retour à l'annuaire</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js" integrity="sha384-v3Z/Xdw1sCeo6M/geW7sn1Lt9obIm7MhAk8laVV+rvYFmzuWDELOiygx7dVte2dX" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js" integrity="sha384-p62xBRve8PdqGDGASZtZMuHgPsyPcT5VsFwgmz2p4zaFdEtt5ZzNqxK+CLzQS7xP" crossorigin="anonymous"></script>
    <script src="global.js"></script>
    <script src="billet.js"></script>
</body>
</html>
