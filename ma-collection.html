<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdnjs.cloudflare.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https://drive.google.com https://drive.usercontent.google.com https://lh3.googleusercontent.com https://res.cloudinary.com; connect-src 'self' https://www.gstatic.com https://lhwcoybugdsggcclhtgb.supabase.co https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.googleapis.com https://accounts.google.com https://api.cloudinary.com https://billet-proxy-worker.cyril-samson41.workers.dev; frame-src 'self' https://asso-billet-site.firebaseapp.com https://apis.google.com https://accounts.google.com;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ma collection — suivi personnalisé de ma collection de billets touristiques.">
    <title>Ma collection - BilletsTouristiques</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body data-require-email="cyril.samson41@gmail.com">
    <div id="menu-placeholder"></div>
    <div id="app-content" style="display:none">

        <div class="collection-page">
            <div class="collection-header">
                <h1><i class="fa-solid fa-layer-group"></i> Ma collection</h1>
            </div>

            <!-- Compteur héros -->
            <div id="collection-counter" class="collection-counter"></div>

            <!-- Section paramétrage -->
            <div class="collection-section">
                <div class="collection-section-header">
                    <h2><i class="fa-solid fa-sliders"></i> Mon périmètre de collection</h2>
                    <button id="btn-toggle-params" class="btn-secondary btn-sm" onclick="collToggleParams()">
                        <i class="fa-solid fa-chevron-down"></i> Modifier
                    </button>
                </div>
                <div id="collection-perimetre-summary" class="collection-perimetre-summary">
                    <!-- Résumé du périmètre injecté par JS -->
                </div>
            </div>

            <!-- Panel de paramétrage (masqué par défaut) -->
            <div id="collection-params-panel" class="collection-params-panel" style="display:none">

                <!-- Frise temporelle visuelle -->
                <div id="collection-frise" class="collection-frise"></div>

                <!-- Liste des points de rupture -->
                <div id="collection-breakpoints" class="collection-breakpoints"></div>

                <!-- Bouton ajouter -->
                <div class="collection-params-actions">
                    <button class="btn-secondary btn-sm" onclick="collAddBreakpoint()">
                        <i class="fa-solid fa-plus"></i> Ajouter un point de rupture
                    </button>
                </div>

                <!-- Boutons sauvegarder/annuler -->
                <div class="collection-params-save">
                    <button class="btn-secondary" onclick="collCancelParams()">Annuler</button>
                    <button class="btn-primary" onclick="collSaveParams()">
                        <i class="fa-solid fa-check"></i> Enregistrer
                    </button>
                </div>
            </div>

            <!-- Barre de recherche + filtres -->
            <div class="collection-toolbar">
                <div class="collection-search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="coll-search" placeholder="Chercher par référence, nom..." oninput="collSearch()">
                </div>
                <div class="collection-dropdowns">
                    <select id="coll-filter-pays" class="coll-dropdown" onchange="collFilterPays()">
                        <option value="">Tous les pays</option>
                    </select>
                    <select id="coll-filter-annee" class="coll-dropdown" onchange="collFilterAnnee()">
                        <option value="">Toutes les années</option>
                    </select>
                </div>
                <div class="collection-filters">
                    <button class="coll-filter-btn active" data-filter="all" onclick="collFilter('all')">Dans le périmètre</button>
                    <button class="coll-filter-btn" data-filter="owned" onclick="collFilter('owned')">Possédés</button>
                    <button class="coll-filter-btn" data-filter="missing" onclick="collFilter('missing')">Manquants</button>
                    <button class="coll-filter-btn" data-filter="outofscope" onclick="collFilter('outofscope')">Hors périmètre</button>
                </div>
            </div>

            <!-- Compteurs par pays -->
            <div id="collection-country-counters" class="collection-country-counters"></div>

            <!-- Grille des billets -->
            <div id="collection-content"></div>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js" integrity="sha384-v3Z/Xdw1sCeo6M/geW7sn1Lt9obIm7MhAk8laVV+rvYFmzuWDELOiygx7dVte2dX" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js" integrity="sha384-p62xBRve8PdqGDGASZtZMuHgPsyPcT5VsFwgmz2p4zaFdEtt5ZzNqxK+CLzQS7xP" crossorigin="anonymous"></script>
    <script src="global.js"></script>
    <script src="ma-collection.js"></script>
</body>
</html>
