<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdnjs.cloudflare.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https://drive.google.com https://drive.usercontent.google.com https://lh3.googleusercontent.com https://res.cloudinary.com; connect-src 'self' https://www.gstatic.com https://lhwcoybugdsggcclhtgb.supabase.co https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.googleapis.com https://accounts.google.com https://api.cloudinary.com https://billet-proxy-worker.cyril-samson41.workers.dev; frame-src 'self' https://asso-billet-site.firebaseapp.com https://apis.google.com https://accounts.google.com;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mes inscriptions — liste de mes engagements aux collectes.">
    <title>Mes inscriptions - BilletsTouristiques</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="menu-placeholder"></div>
    <div id="app-content" style="display:none">

        <div class="inscriptions-page">
            <div class="inscriptions-header">
                <h1><i class="fa-solid fa-clipboard-list"></i> Mes inscriptions</h1>
            </div>

            <div class="tabs-bar" id="inscriptions-tabs">
                <button class="tab-btn active" onclick="showInscriptionsTab('inscriptions')"><i class="fa-solid fa-clipboard-list"></i> Mes inscriptions</button>
                <button class="tab-btn" onclick="showInscriptionsTab('envois')"><i class="fa-solid fa-envelope"></i> Mes envois</button>
            </div>

            <div id="inscriptions-view">
                <div id="inscriptions-summary"></div>
                <!-- #9 — Filtres par statut de paiement -->
                <div class="inscriptions-filters" id="inscriptions-filters">
                    <button class="inscriptions-filter-btn active" onclick="filterInscriptions('tous')">Tous</button>
                    <button class="inscriptions-filter-btn" onclick="filterInscriptions('non_paye')"><i class="fa-solid fa-circle-exclamation"></i> Non payé</button>
                    <button class="inscriptions-filter-btn" onclick="filterInscriptions('declare')"><i class="fa-solid fa-clock"></i> En attente</button>
                    <button class="inscriptions-filter-btn" onclick="filterInscriptions('confirme')"><i class="fa-solid fa-check"></i> Payé</button>
                </div>
                <div id="inscriptions-list"></div>
                <div id="inscriptions-empty" style="display:none">
                    <div class="inscriptions-empty-state">
                        <i class="fa-solid fa-circle-info"></i>
                        <p>Vous n'êtes inscrit à aucune collecte.</p>
                        <a href="billets.html" class="btn-voir-catalogue">Voir le catalogue</a>
                    </div>
                </div>
            </div>

            <div id="envois-view" style="display:none"></div>
        </div>

    </div>

    <!-- Modale modifier quantités pré-collecte -->
    <div id="modifier-preinsc-modal" class="user-modal-overlay" style="display:none" onclick="if(event.target===this)fermerModifierPreCollecte()">
        <div class="user-modal" role="dialog" aria-modal="true">
            <h2 class="user-modal-title"><i class="fa-solid fa-pen"></i> Modifier l'inscription</h2>
            <p id="modifier-preinsc-titre" class="user-modal-desc"></p>
            <div id="modifier-preinsc-fields" class="preinsc-qty-fields"></div>
            <div class="user-modal-actions">
                <button type="button" class="user-modal-btn" onclick="fermerModifierPreCollecte()">Annuler</button>
                <button type="button" class="user-modal-btn user-modal-btn-primary" onclick="confirmerModifierPreCollecte()">Confirmer</button>
            </div>
        </div>
    </div>

    <!-- QW-3 — Modale de confirmation paiement -->
    <div id="confirm-paiement-modal" class="user-modal-overlay" style="display:none" onclick="if(event.target===this)annulerDeclarationPaiement()">
        <div class="user-modal" role="alertdialog" aria-modal="true">
            <h2 class="user-modal-title"><i class="fa-solid fa-hand-holding-dollar"></i> Confirmer le paiement</h2>
            <p id="confirm-paiement-msg" class="user-modal-desc"></p>
            <div class="user-modal-actions">
                <button type="button" class="user-modal-btn" onclick="annulerDeclarationPaiement()">Annuler</button>
                <button type="button" class="user-modal-btn user-modal-btn-primary" onclick="confirmerDeclarationPaiement()">Oui, j'ai payé</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js" integrity="sha384-v3Z/Xdw1sCeo6M/geW7sn1Lt9obIm7MhAk8laVV+rvYFmzuWDELOiygx7dVte2dX" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js" integrity="sha384-p62xBRve8PdqGDGASZtZMuHgPsyPcT5VsFwgmz2p4zaFdEtt5ZzNqxK+CLzQS7xP" crossorigin="anonymous"></script>
    <script src="global.js"></script>
    <script src="mes-inscriptions.js"></script>
</body>
</html>
