    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous">

<body>
    <div id="menu-placeholder"></div>
    <div id="app-content" style="display:none">

        <div class="inscriptions-page">
            <div class="inscriptions-header">
                <h1><i class="fa-solid fa-clipboard-list"></i> Mes inscriptions</h1>
            </div>

            <div class="tabs-bar" id="inscriptions-tabs">
                <button class="tab-btn active" onclick="showInscriptionsTab('inscriptions')"><i class="fa-solid fa-clipboard-list"></i> Mes inscriptions</button>
                <button class="tab-btn" onclick="showInscriptionsTab('envois')"><i class="fa-solid fa-envelope"></i> Mes envois</button>
            </div>

            <div id="inscriptions-view">
                <div id="inscriptions-summary"></div>
                <div id="inscriptions-list"></div>
                <div id="inscriptions-empty" style="display:none">
                    <div class="inscriptions-empty-state">
                        <i class="fa-solid fa-circle-info"></i>
                        <p>Vous n'êtes inscrit à aucune collecte.</p>
                        <a href="billets.html" class="btn-voir-catalogue">Voir le catalogue</a>
                    </div>
                </div>
            </div>

            <div id="envois-view" style="display:none"></div>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js" integrity="sha384-v3Z/Xdw1sCeo6M/geW7sn1Lt9obIm7MhAk8laVV+rvYFmzuWDELOiygx7dVte2dX" crossorigin="anonymous"></script>
