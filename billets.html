<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdnjs.cloudflare.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https://drive.google.com https://drive.usercontent.google.com https://lh3.googleusercontent.com https://res.cloudinary.com; connect-src 'self' https://www.gstatic.com https://lhwcoybugdsggcclhtgb.supabase.co https://ijxajtxnhbczgiarkefo.supabase.co https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.googleapis.com https://accounts.google.com https://api.cloudinary.com https://billet-proxy-worker.cyril-samson41.workers.dev; frame-src 'self' https://asso-billet-site.firebaseapp.com https://apis.google.com https://accounts.google.com;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Annuaire complet de la collection de billets touristiques — recherche, filtres et visualisation.">
    <title>Les Billets - Collection Billet Touristique</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.css" integrity="sha512-qveKnGrvOChbSzAdtSs8p69eoLegyh+1hwOMbmpCViIwj7rn4oJjdmMvWOuyQlTOZgTlZA0N2PXA7iA8/2TUYA==" crossorigin="anonymous">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.js" integrity="sha512-UOJe4paV6hYWBnS0c9GnIRH8PLm2nFK22uhfAvsTIqd3uwnWsVri1OPn5fJYdLtGY3wB11LGHJ4yPU1WFJeBYQ==" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="view-collecte"> <div id="app-content">
        <div id="menu-placeholder"></div>

        <header>
            <div>
                <span style="font-weight:bold; font-size:1.2em;">Annuaire Billets</span>
                <span id="counter" style="background:#eee; padding:5px 10px; border-radius:15px; font-size:0.8em; margin-left:10px;">Chargement...</span>
            </div>
        </header>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; gap:10px; flex-wrap:wrap;">
            <div style="display:flex; align-items:center; gap:6px;">
                <span style="font-size:0.8em; color:var(--color-text-muted); font-weight:bold;">Trier par</span>
                <button id="btn-sort-date" onclick="setSortMode('date')" class="btn-mode btn-mode--active" title="Trier par date"><i class="fa-solid fa-calendar-days"></i> Date</button>
                <button id="btn-sort-ref" onclick="setSortMode('reference')" class="btn-mode" title="Trier par référence"><i class="fa-solid fa-arrow-down-a-z"></i> Référence</button>
            </div>
            <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
                <label class="toggle-switch" title="Masquer les billets marqués Pas intéressé">
                    <input type="checkbox" id="toggle-masquer-pas-interesse" onchange="toggleMasquerPasInteresse()">
                    <span class="toggle-slider"></span>
                    <span class="toggle-label">Masquer les <em>pas intéressé</em></span>
                </label>
                <div style="display:flex; gap:10px;">
                    <button onclick="changeView('collecte')" class="btn-mode" title="Mode Collecte"><i class="fa-solid fa-address-card"></i> Collecte</button>
                    <button onclick="changeView('liste')" class="btn-mode" title="Mode Liste"><i class="fa-solid fa-list"></i> Liste</button>
                    <button onclick="changeView('galerie')" class="btn-mode" title="Mode Galerie"><i class="fa-solid fa-images"></i> Galerie</button>
                </div>
            </div>
        </div>

        <div class="filters-row">
            <div class="filter-group" style="flex-grow: 2;">
                <label for="search-input">Recherche</label>
                <input type="text" id="search-input" placeholder="Ville, Nom, Réf..." onkeyup="applyFilters()">
            </div>

            <div class="filter-group" style="min-width: 300px; flex-grow: 1.5;">
                <label>Période (Date)</label>

                <div id="date-slider" style="margin: 10px 10px 20px 10px;" role="group" aria-label="Filtre par période"></div>

                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="date" id="date-start" aria-label="Date de début" onchange="manualDateChange()">
                    <span style="color:#999;" aria-hidden="true">à</span>
                    <input type="date" id="date-end" aria-label="Date de fin" onchange="manualDateChange()">
                </div>
            </div>
        </div>

        <div class="filters-row">
            <div class="filter-group"><label for="sel-coll">Collecteur</label><select id="sel-coll" onchange="applyFilters()"><option value="">Tout</option></select></div>
            <div class="filter-group">
                <label>Pays</label>
                <div class="multiselect-wrapper" id="pays-multiselect-wrapper">
                    <button type="button" class="multiselect-btn" id="sel-pays-btn" onclick="togglePaysDropdown(event)" aria-haspopup="listbox" aria-expanded="false">
                        <span id="sel-pays-label">Tous</span>
                        <i class="fa-solid fa-chevron-down multiselect-chevron"></i>
                    </button>
                    <div class="multiselect-dropdown" id="sel-pays-dropdown" role="listbox" aria-multiselectable="true" style="display:none;"></div>
                </div>
            </div>
            <div class="filter-group"><label for="sel-year">Millésime</label><select id="sel-year" onchange="applyFilters()"><option value="">Tout</option></select></div>
            <div class="filter-group"><label for="sel-theme">Thème</label><select id="sel-theme" onchange="applyFilters()"><option value="">Tout</option></select></div>
        </div>

        <!-- Filtres par catégorie (chips) -->
        <div id="billets-status-counters" class="admin-status-counters"></div>

        <div id="cards-grid">
            <p style="text-align:center; padding:40px; color:#666; font-style:italic;">Chargement de la collection...</p>
        </div>

        <div id="list-table-container" class="hidden">
            </div>

        <div style="text-align:center; margin: 40px 0;">
            <button id="btn-load-more" onclick="showMore()">Voir la suite</button>
        </div>

    </div> <div id="image-modal" class="image-modal hidden" onclick="closeModal()">
        <span class="close-btn" role="button" aria-label="Fermer l'image" tabindex="0">&times;</span>
        <img class="modal-content" id="modal-image">
    </div>


    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js" integrity="sha384-v3Z/Xdw1sCeo6M/geW7sn1Lt9obIm7MhAk8laVV+rvYFmzuWDELOiygx7dVte2dX" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js" integrity="sha384-p62xBRve8PdqGDGASZtZMuHgPsyPcT5VsFwgmz2p4zaFdEtt5ZzNqxK+CLzQS7xP" crossorigin="anonymous"></script>

    <!-- Modale de confirmation paiement catalogue -->
    <div id="confirm-paiement-catalogue-modal" class="user-modal-overlay" style="display:none" onclick="if(event.target===this)annulerDeclarationPaiementCatalogue()">
        <div class="user-modal" role="alertdialog" aria-modal="true">
            <h2 class="user-modal-title"><i class="fa-solid fa-hand-holding-dollar"></i> Confirmer le paiement</h2>
            <p id="confirm-paiement-catalogue-msg" class="user-modal-desc"></p>
            <div class="user-modal-actions">
                <button type="button" class="user-modal-btn" onclick="annulerDeclarationPaiementCatalogue()">Annuler</button>
                <button type="button" class="user-modal-btn user-modal-btn-primary" onclick="confirmerDeclarationPaiementCatalogue()">Oui, j'ai payé</button>
            </div>
        </div>
    </div>

    <script src="global.js"></script>
    <script src="app-new.js"></script>

</body>
</html>
