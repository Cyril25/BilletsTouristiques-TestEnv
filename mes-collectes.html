<body>
    <div id="menu-placeholder"></div>
    <div id="app-content" style="display:none">

        <div class="collectes-page">
            <div class="collectes-header">
                <h1><i class="fa-solid fa-clipboard-list"></i> Mes collectes</h1>
            </div>

            <div id="collecteur-check"></div>

            <div class="collectes-tabs">
                <button class="tab-btn active" onclick="showTab('collectes')">Mes collectes</button>
                <button class="tab-btn" onclick="showTab('paiements')">Vérification paiement</button>
                <button class="tab-btn" onclick="showTab('envois')">Préparation des envois</button>
                <button class="tab-btn" onclick="showTab('historique')">Historique des envois</button>
            </div>

            <div id="collectes-list"></div>

            <div id="collecte-detail" style="display:none"></div>

            <div id="paiements-view" style="display:none"></div>

            <div id="envois-view" style="display:none"></div>

            <div id="historique-view" style="display:none"></div>
        </div>

        <div id="relance-modal" class="relance-modal-overlay" style="display:none"></div>
        <div id="inscription-modal" class="relance-modal-overlay" style="display:none"></div>

    </div>
